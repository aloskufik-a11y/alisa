# Render.com Blueprint
# Подключи репо к Render, выбери "Blueprint" и Render развернёт сервис автоматически.
# Вручную потом добавь переменные с sync: false в дашборде (значения не хранятся в git).
#
# Free Web Service (vs paid Worker) — потому что у Render free tier поддерживает
# только web services, и они засыпают через 15 мин idle. Мы держим бота
# проснувшимся внешним пингом /healthz каждые 5 минут (cron-job.org / UptimeRobot).

services:
  - type: web
    name: gift-monitor-bot
    runtime: docker
    plan: free
    region: frankfurt
    branch: devin/1777733662-fix-parsing-and-monitoring
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: USER_ID
        sync: false
      - key: TELEGRAM_STRING_SESSION
        sync: false
      - key: WEBAPP_BACKEND_URL
        value: https://gift-monitor-mini-app.onrender.com
      - key: MINI_APP_URL
        value: https://gift-monitor-mini-app.onrender.com
      - key: WEBAPP_BACKEND_KEY
        sync: false
      - key: GETGEMS_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO

  # Mini App backend (FastAPI). Бот пушит сюда фид + настройки через
  # X-API-Key (значение WEBAPP_BACKEND_KEY у бота должно совпадать с
  # PUSH_API_KEY у этого сервиса). На free tier нет persistent disk —
  # backend пишет state в .state/ внутри контейнера, который очищается
  # при каждом redeploy. Это OK: бот пушит данные непрерывно.
  - type: web
    name: gift-monitor-mini-app
    runtime: docker
    plan: free
    region: frankfurt
    branch: devin/1777975321-mini-app-overhaul
    dockerfilePath: ./webapp_backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PUSH_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
