<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Gift Monitor — лента выгодных лотов</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #14171c);
    --fg: var(--tg-theme-text-color, #f5f5f5);
    --fg-dim: var(--tg-theme-hint-color, #8a8f97);
    --card: var(--tg-theme-secondary-bg-color, #1d2129);
    --accent: var(--tg-theme-button-color, #4ea1ff);
    --accent-fg: var(--tg-theme-button-text-color, #ffffff);
    --good: #34c77c;
    --warn: #f7b955;
    --bad: #ff5c5c;
    --mrkt: #a06bff;
    --portals: #34c77c;
    --fragment: #4ea1ff;
  }

  * { box-sizing: border-box; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--fg);
              font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
              font-size:15px; -webkit-tap-highlight-color: transparent; }
  body { padding-bottom: 90px; }

  header { position:sticky; top:0; z-index:10; background:var(--bg);
           border-bottom:1px solid rgba(255,255,255,.06);
           padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
  h1 { margin:0; font-size:18px; font-weight:600; letter-spacing:-.01em;
       display:flex; align-items:center; gap:8px; }
  .subtitle { font-size:12px; color:var(--fg-dim); }
  .filters { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .pill { background:var(--card); border:1px solid transparent; border-radius:999px;
          padding:6px 10px; font-size:13px; cursor:pointer; user-select:none;
          color:var(--fg-dim); transition:all .15s; line-height:1; }
  .pill.active { background:var(--accent); color:var(--accent-fg); border-color:var(--accent); }
  .pill:active { transform:scale(.97); }
  .pill.icon-only { padding:6px 9px; }

  .row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .row label { font-size:12px; color:var(--fg-dim); }
  input[type="number"] { background:var(--card); color:var(--fg); border:none;
                         border-radius:8px; padding:6px 8px; width:78px; font-size:13px; }
  input[type="text"] { background:var(--card); color:var(--fg); border:none;
                       border-radius:8px; padding:6px 10px; font-size:13px; flex:1; min-width:120px; }
  select { background:var(--card); color:var(--fg); border:none;
           border-radius:8px; padding:6px 8px; font-size:13px; }

  main { padding:10px 12px 0; display:flex; flex-direction:column; gap:8px; }
  .empty { text-align:center; padding:60px 16px; color:var(--fg-dim); }
  .empty .e-emoji { font-size:42px; margin-bottom:8px; }

  .card { background:var(--card); border-radius:14px; padding:12px;
          display:flex; gap:10px; align-items:flex-start;
          border:1px solid transparent; cursor:pointer;
          transition:transform .12s ease, border-color .12s ease; }
  .card:active { transform:scale(.99); }
  .card.disc-high { border-color:rgba(52,199,124,.35); }
  .card.disc-mega { border-color:rgba(52,199,124,.7);
                    box-shadow: 0 0 0 1px rgba(52,199,124,.25); }
  .thumb { width:64px; height:64px; border-radius:10px;
           background:linear-gradient(135deg,#2a2f38,#1a1d22);
           background-size:cover; background-position:center; flex:none;
           display:flex; align-items:center; justify-content:center; font-size:28px; }
  .info { flex:1; min-width:0; }
  .title { font-size:15px; font-weight:600; line-height:1.2;
           overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .num { color:var(--fg-dim); font-weight:400; }
  .meta { font-size:12px; color:var(--fg-dim); margin-top:2px;
          overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .price-row { display:flex; gap:8px; align-items:baseline; margin-top:6px; flex-wrap:wrap; }
  .price { font-size:16px; font-weight:600; color:var(--fg); }
  .floor { font-size:12px; color:var(--fg-dim); }
  .badge { background:rgba(255,255,255,.08); color:var(--fg);
           padding:2px 8px; border-radius:999px; font-size:11px; line-height:1.3; }
  .badge.good { background:rgba(52,199,124,.15); color:var(--good); }
  .badge.warn { background:rgba(247,185,85,.15); color:var(--warn); }
  .badge.bad  { background:rgba(255,92,92,.18);  color:var(--bad); }
  .badge.market-mrkt { background:rgba(160,107,255,.18); color:var(--mrkt); }
  .badge.market-portals { background:rgba(52,199,124,.18); color:var(--portals); }
  .badge.market-fragment { background:rgba(78,161,255,.18); color:var(--fragment); }

  footer { position:fixed; bottom:0; left:0; right:0; padding:10px 14px;
           background:var(--bg); border-top:1px solid rgba(255,255,255,.06);
           font-size:12px; color:var(--fg-dim);
           display:flex; justify-content:space-between; align-items:center; gap:6px; }

  /* Tabs */
  .tabs { display:flex; gap:4px; }
  .tab { flex:1; padding:8px; text-align:center; background:var(--card);
         border-radius:10px; cursor:pointer; font-size:13px; color:var(--fg-dim); }
  .tab.active { background:var(--accent); color:var(--accent-fg); font-weight:500; }

  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7);
                   z-index:50; display:none; align-items:flex-end; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--bg); border-radius:18px 18px 0 0;
           width:100%; max-height:88vh; overflow-y:auto;
           padding:18px 16px 24px;
           border-top: 1px solid rgba(255,255,255,.05); }
  .modal h2 { margin:0 0 4px; font-size:18px; }
  .modal .num { color:var(--fg-dim); font-weight:400; }
  .modal-thumb { width:100%; aspect-ratio: 1.3; max-height:240px; border-radius:14px;
                 margin:8px 0 12px;
                 background:linear-gradient(135deg,#2a2f38,#1a1d22);
                 background-size:cover; background-position:center;
                 display:flex; align-items:center; justify-content:center; font-size:64px; }
  .modal-row { display:flex; justify-content:space-between; padding:8px 0;
               border-bottom:1px solid rgba(255,255,255,.06); font-size:14px; }
  .modal-row .k { color:var(--fg-dim); }
  .modal-row .v { color:var(--fg); font-weight:500; }
  .btn { background:var(--accent); color:var(--accent-fg);
         padding:10px 16px; border-radius:10px; font-size:14px;
         text-decoration:none; font-weight:500; display:inline-block;
         text-align:center; }
  .btn.secondary { background:rgba(255,255,255,.08); color:var(--fg); }
  .btn.full { width:100%; padding:14px; margin-top:10px; font-size:15px; }
  .modal-close { position:absolute; top:14px; right:14px; cursor:pointer;
                 width:32px; height:32px; border-radius:16px;
                 background:rgba(255,255,255,.08); display:flex;
                 align-items:center; justify-content:center; font-size:18px; }
  .pill-inline { display:inline-block; margin:2px; padding:3px 8px;
                 border-radius:999px; background:rgba(255,255,255,.06);
                 font-size:12px; }
  .rarity-bar { height:6px; border-radius:3px; background:rgba(255,255,255,.08);
                margin:4px 0; overflow:hidden; }
  .rarity-bar > span { display:block; height:100%; background:var(--good);
                       border-radius:3px; }

  /* Settings panel */
  .settings-section { background:var(--card); border-radius:14px; padding:14px;
                      margin-bottom:10px; }
  .settings-section h3 { margin:0 0 8px; font-size:14px; color:var(--fg-dim);
                         text-transform:uppercase; letter-spacing:.05em; }
  .settings-row { display:flex; justify-content:space-between; align-items:center;
                  padding:8px 0; border-bottom:1px solid rgba(255,255,255,.06);
                  font-size:14px; }
  .settings-row:last-child { border:none; padding-bottom:0; }
  .settings-row .k { color:var(--fg-dim); }
  .settings-row .v { color:var(--fg); font-weight:500; text-align:right;
                     max-width:60%; word-break:break-word; }
  .toast { position:fixed; left:50%; bottom:90px; transform:translateX(-50%);
           background:var(--card); padding:8px 14px; border-radius:8px;
           font-size:13px; opacity:0; pointer-events:none; transition:opacity .25s; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<header>
  <div style="display:flex; justify-content:space-between; align-items:flex-start;">
    <div>
      <h1>🎁 Gift Monitor</h1>
      <div class="subtitle" id="subtitle">загрузка…</div>
    </div>
    <span class="pill icon-only" id="refresh-btn" title="Обновить">↻</span>
  </div>
  <div class="tabs">
    <div class="tab active" data-view="feed">📊 Лента</div>
    <div class="tab" data-view="settings">⚙️ Настройки</div>
  </div>
  <div id="filter-bar">
    <div class="filters">
      <span class="pill active" data-market="all">Все</span>
      <span class="pill" data-market="mrkt">🟣 MRKT</span>
      <span class="pill" data-market="portals">🟢 Portals</span>
      <span class="pill" data-market="fragment">🔵 Fragment</span>
    </div>
    <div class="row" style="margin-top:6px;">
      <label>сорт.:</label>
      <select id="sort">
        <option value="ts">по времени</option>
        <option value="discount">по % скидки</option>
        <option value="price-asc">цена ↑</option>
        <option value="price-desc">цена ↓</option>
        <option value="rarity">по редкости</option>
      </select>
      <label>мин. скидка от Floor, %:</label>
      <input type="number" id="min-disc" min="0" max="99" value="0" />
    </div>
    <div class="row" style="margin-top:6px;">
      <input type="text" id="search" placeholder="🔍 поиск: Vice Cream, Plush…" />
    </div>
    <div class="filters" style="margin-top:6px;">
      <span class="pill" data-flag="monochrome">🎨 Монохром</span>
      <span class="pill" data-flag="lucky">🍀 Lucky</span>
      <span class="pill" data-flag="palindrome">🔄 Палиндром</span>
      <span class="pill" data-flag="round">⭕ Круглые</span>
      <span class="pill" data-flag="repeat">🔁 Повтор</span>
      <span class="pill" data-flag="sub100">🥇 #&lt;100</span>
      <span class="pill" data-flag="rare">💠 Редкий ≤5‰</span>
      <span class="pill" data-flag="below-floor">⬇️ Ниже Floor</span>
    </div>
  </div>
</header>

<main id="feed-view">
  <div class="empty"><div class="e-emoji">⏳</div>Загружаем ленту…</div>
</main>

<main id="settings-view" style="display:none;">
  <div class="empty"><div class="e-emoji">⚙️</div>Настройки бота загружаются…</div>
</main>

<footer>
  <span id="count-line">—</span>
  <span id="ts-line">—</span>
</footer>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal" style="position:relative;">
    <span class="modal-close" id="modal-close">✕</span>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.expand(); tg.ready(); tg.MainButton?.hide(); tg.disableVerticalSwipes?.(); }

  const STATE = {
    market: "all",
    minDisc: 0,
    search: "",
    flags: new Set(),
    sort: "ts",
    items: [],
    settings: null,
    lastFetch: 0,
    source: "—",
    view: "feed",
  };

  const fmt = (n) => (n == null || isNaN(n) ? "—" : (Math.round(n * 100) / 100).toFixed(2));

  function categories(num) {
    const n = parseInt(num, 10);
    if (!Number.isFinite(n) || n <= 0) return new Set();
    const s = String(n);
    const cats = new Set();
    if (n <= 999) cats.add("low");
    if (n <= 99) cats.add("sub100");
    if ([10,100,1000,10000,100000,1000000].includes(n)) cats.add("round");
    if (n >= 100 && n % 100 === 0) cats.add("pretty100");
    if (s.length >= 2 && new Set(s).size === 1) cats.add("repeat");
    if (s.split("").every(c => c === "7")) cats.add("lucky");
    if (s.length >= 3) {
      const asc = s.split("").every((c, i) => i === 0 || +c === +s[i-1]+1);
      const desc = s.split("").every((c, i) => i === 0 || +c === +s[i-1]-1);
      if (asc || desc) cats.add("sequential");
    }
    if (s.length >= 3 && s === s.split("").reverse().join("") && new Set(s).size > 1) {
      cats.add("palindrome");
    }
    return cats;
  }

  function rgbToHsl(rgb) {
    const r = ((rgb >> 16) & 255) / 255;
    const g = ((rgb >> 8) & 255) / 255;
    const b = (rgb & 255) / 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    const l = (max + min) / 2;
    if (max === min) return [0, 0, l];
    const d = max - min;
    const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    let h;
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0));
    else if (max === g) h = ((b - r) / d + 2);
    else h = ((r - g) / d + 4);
    return [h * 60, s, l];
  }

  function isMonochrome(colors) {
    if (!colors || colors.length < 2) return false;
    const hsl = colors.map(rgbToHsl);
    if (hsl.every(([_, s]) => s < 0.15)) return true;
    const hues = hsl.filter(([_, s]) => s >= 0.15).map(([h]) => h);
    if (hues.length < 2) return false;
    const dist = (a, b) => Math.min(Math.abs(a - b), 360 - Math.abs(a - b));
    const base = hues[0];
    return hues.every(h => dist(h, base) <= 25);
  }

  function isRare(rar, threshold = 5) {
    if (!rar) return false;
    return Object.values(rar).some(v => typeof v === "number" && v > 0 && v <= threshold);
  }

  function getDiscount(it) {
    const f = it.floor_price, p = it.price;
    if (typeof f !== "number" || typeof p !== "number" || f <= 0 || p <= 0) return null;
    return (f - p) / f * 100;
  }

  function pillEmoji(cat) {
    return ({lucky:"🍀", repeat:"🔁", round:"⭕", sub100:"🥇", low:"💯",
             pretty100:"🔢", sequential:"↗️", palindrome:"🔄"})[cat] || "";
  }

  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    })[c]);
  }

  function thumbHTML(it) {
    if (it.image_url) {
      return `<div class="thumb" style="background-image:url('${escapeHtml(it.image_url)}')"></div>`;
    }
    const emoji = it.market === "mrkt" ? "🟣" :
                  it.market === "portals" ? "🟢" :
                  it.market === "fragment" ? "🔵" : "🎁";
    return `<div class="thumb">${emoji}</div>`;
  }

  function badgesFor(it) {
    const cats = categories(it.number);
    const mono = isMonochrome(it.colors);
    const rare = isRare(it.rarities_pm, 5);
    const ultraRare = isRare(it.rarities_pm, 1);
    const disc = getDiscount(it);
    const out = [];
    for (const c of cats) {
      const e = pillEmoji(c);
      if (e) out.push(`<span class="badge">${e}</span>`);
    }
    if (mono) out.push(`<span class="badge">🎨</span>`);
    if (ultraRare) out.push(`<span class="badge good">💠 ультра-редкий</span>`);
    else if (rare) out.push(`<span class="badge good">💠 редкий</span>`);
    if (disc != null) {
      if (disc >= 25) out.push(`<span class="badge good">−${disc.toFixed(1)}% 🔥</span>`);
      else if (disc >= 5) out.push(`<span class="badge good">−${disc.toFixed(1)}%</span>`);
      else if (disc < -10) out.push(`<span class="badge bad">+${(-disc).toFixed(1)}%</span>`);
    }
    return out.join(" ");
  }

  function renderCard(it) {
    const disc = getDiscount(it);
    const meta = [it.model_name, it.backdrop_name, it.symbol_name].filter(Boolean).join(" · ");
    let cls = "card";
    if (disc != null && disc >= 25) cls += " disc-mega";
    else if (disc != null && disc >= 5) cls += " disc-high";

    const numStr = it.number ? `<span class="num">#${escapeHtml(it.number)}</span>` : "";
    let priceLine = `<span class="price">${fmt(it.price)} 💎</span>`;
    if (typeof it.floor_price === "number" && it.floor_price > 0) {
      priceLine += ` <span class="floor">Floor: ${fmt(it.floor_price)}</span>`;
    }
    return `
      <article class="${cls}" data-id="${escapeHtml(it.market + ":" + it.id)}">
        ${thumbHTML(it)}
        <div class="info">
          <div class="title">
            <span class="badge market-${it.market}">${(it.market||"?").toUpperCase()}</span>
            ${escapeHtml(it.name)} ${numStr}
          </div>
          ${meta ? `<div class="meta">${escapeHtml(meta)}</div>` : ""}
          <div class="price-row">${priceLine}</div>
          <div class="row" style="margin-top:6px;">${badgesFor(it)}</div>
        </div>
      </article>`;
  }

  function applyFilters(items) {
    const q = STATE.search.trim().toLowerCase();
    let out = items.filter(it => {
      if (STATE.market !== "all" && it.market !== STATE.market) return false;
      if (STATE.minDisc > 0) {
        const d = getDiscount(it);
        if (d == null || d < STATE.minDisc) return false;
      }
      if (q) {
        const hay = [it.name, it.number, it.model_name, it.backdrop_name, it.symbol_name]
          .filter(Boolean).join(" ").toLowerCase();
        if (!hay.includes(q)) return false;
      }
      const cats = categories(it.number);
      const mono = isMonochrome(it.colors);
      const rare = isRare(it.rarities_pm, 5);
      const d = getDiscount(it);
      for (const flag of STATE.flags) {
        if (flag === "monochrome" && !mono) return false;
        if (flag === "rare" && !rare) return false;
        if (flag === "below-floor") {
          if (d == null || d <= 0) return false;
        }
        if (["lucky","palindrome","round","repeat","sub100","sequential","low","pretty100"].includes(flag)) {
          if (!cats.has(flag)) return false;
        }
      }
      return true;
    });

    const cmp = {
      "ts":         (a,b) => (b.ts || 0) - (a.ts || 0),
      "discount":   (a,b) => (getDiscount(b) ?? -999) - (getDiscount(a) ?? -999),
      "price-asc":  (a,b) => (a.price ?? Infinity) - (b.price ?? Infinity),
      "price-desc": (a,b) => (b.price ?? -1) - (a.price ?? -1),
      "rarity":     (a,b) => {
        const ra = Math.min(...Object.values(a.rarities_pm || {}).filter(v => typeof v === "number" && v > 0), Infinity);
        const rb = Math.min(...Object.values(b.rarities_pm || {}).filter(v => typeof v === "number" && v > 0), Infinity);
        return ra - rb;
      },
    }[STATE.sort] || ((a,b) => 0);
    out.sort(cmp);
    return out;
  }

  function render() {
    if (STATE.view !== "feed") return;
    const filtered = applyFilters(STATE.items);
    const main = document.getElementById("feed-view");
    if (!filtered.length) {
      main.innerHTML = STATE.items.length
        ? `<div class="empty"><div class="e-emoji">🔍</div>По текущим фильтрам ничего нет</div>`
        : `<div class="empty"><div class="e-emoji">📡</div>Лента пуста — бот ещё не присылал алертов</div>`;
    } else {
      main.innerHTML = filtered.map(renderCard).join("");
    }
    document.getElementById("count-line").textContent =
      `показано ${filtered.length} / ${STATE.items.length}`;
    if (STATE.lastFetch) {
      const sec = Math.round((Date.now() - STATE.lastFetch) / 1000);
      document.getElementById("ts-line").textContent =
        `${STATE.source} · обновлено ${sec} сек назад`;
    }
  }

  // ─── Modal ──────────────────────────────────────────
  function openModal(item) {
    if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
    const body = document.getElementById("modal-body");
    const meta = [item.model_name, item.backdrop_name, item.symbol_name].filter(Boolean).join(" · ");
    const disc = getDiscount(item);
    const cats = categories(item.number);

    const thumb = item.image_url
      ? `<div class="modal-thumb" style="background-image:url('${escapeHtml(item.image_url)}')"></div>`
      : `<div class="modal-thumb">🎁</div>`;

    const rarityRows = [];
    const rar = item.rarities_pm || {};
    for (const [type, val] of Object.entries(rar)) {
      if (typeof val !== "number" || val <= 0) continue;
      const pct = Math.max(0, 100 - val / 10);
      rarityRows.push(`
        <div class="modal-row">
          <span class="k">${escapeHtml(type)}</span>
          <span class="v">${val.toFixed(2)}‰</span>
        </div>
        <div class="rarity-bar"><span style="width:${pct}%"></span></div>
      `);
    }

    const catBadges = [...cats].map(c => {
      const e = pillEmoji(c);
      const labels = {lucky:"Lucky", palindrome:"Палиндром", round:"Круглый",
                      repeat:"Повтор", sub100:"#<100", low:"#<1000",
                      pretty100:"Pretty 100", sequential:"Последовательный"};
      return `<span class="pill-inline">${e} ${labels[c] || c}</span>`;
    }).join("");

    const mono = isMonochrome(item.colors);

    body.innerHTML = `
      <h2>${escapeHtml(item.name)} ${item.number ? `<span class="num">#${escapeHtml(item.number)}</span>` : ""}</h2>
      <div class="subtitle">
        <span class="badge market-${item.market}">${(item.market||"?").toUpperCase()}</span>
        ${meta ? " · " + escapeHtml(meta) : ""}
      </div>
      ${thumb}
      <div class="modal-row"><span class="k">Цена</span><span class="v">${fmt(item.price)} 💎</span></div>
      <div class="modal-row"><span class="k">Floor</span><span class="v">${item.floor_price != null ? fmt(item.floor_price) + " 💎" : "—"}</span></div>
      ${disc != null ? `<div class="modal-row"><span class="k">Скидка от Floor</span><span class="v" style="color:${disc>=5?'#34c77c':disc<0?'#ff5c5c':'#f5f5f5'}">${disc.toFixed(2)}%</span></div>` : ""}
      ${rarityRows.length ? `<h3 style="margin:12px 0 6px;font-size:13px;color:var(--fg-dim);text-transform:uppercase;letter-spacing:.05em;">Редкость атрибутов</h3>${rarityRows.join("")}` : ""}
      ${(catBadges || mono) ? `<h3 style="margin:12px 0 6px;font-size:13px;color:var(--fg-dim);text-transform:uppercase;letter-spacing:.05em;">Особенности</h3><div>${catBadges}${mono?`<span class="pill-inline">🎨 Монохром</span>`:""}</div>` : ""}
      ${item.url ? `<a class="btn full" href="${escapeHtml(item.url)}" target="_blank" id="open-link">🚀 Открыть в ${(item.market||"маркете").toUpperCase()}</a>` : ""}
    `;
    document.getElementById("modal-overlay").classList.add("show");

    setTimeout(() => {
      const link = document.getElementById("open-link");
      if (link) link.addEventListener("click", e => {
        if (tg?.openTelegramLink && link.href.startsWith("https://t.me/")) {
          e.preventDefault();
          tg.openTelegramLink(link.href);
        } else if (tg?.openLink) {
          e.preventDefault();
          tg.openLink(link.href);
        }
      });
    }, 0);
  }

  document.getElementById("modal-close").addEventListener("click", () => {
    document.getElementById("modal-overlay").classList.remove("show");
  });
  document.getElementById("modal-overlay").addEventListener("click", e => {
    if (e.target.id === "modal-overlay")
      document.getElementById("modal-overlay").classList.remove("show");
  });

  // Card click delegation
  document.getElementById("feed-view").addEventListener("click", e => {
    const card = e.target.closest(".card[data-id]");
    if (!card) return;
    const id = card.dataset.id;
    const item = STATE.items.find(i => `${i.market}:${i.id}` === id);
    if (item) openModal(item);
  });

  // ─── Settings view ─────────────────────────────────
  function fmtSetting(k, v) {
    if (typeof v === "boolean") return v ? "✅ Вкл" : "⬜ Выкл";
    if (Array.isArray(v)) return v.length ? v.join(", ") : "—";
    if (k === "quiet_hours_start" || k === "quiet_hours_end") return `${String(v).padStart(2,"0")}:00 UTC`;
    return String(v);
  }

  function renderSettings() {
    const main = document.getElementById("settings-view");
    if (!STATE.settings) {
      main.innerHTML = `<div class="empty"><div class="e-emoji">⚠️</div>Настройки не получены — бот, возможно, не запущен или не подключён к этому Web App.</div>`;
      return;
    }
    const s = STATE.settings;
    const sec = (title, rows) => `
      <div class="settings-section">
        <h3>${title}</h3>
        ${rows.map(([k, label]) => `
          <div class="settings-row">
            <span class="k">${label}</span>
            <span class="v">${escapeHtml(fmtSetting(k, s[k]))}</span>
          </div>`).join("")}
      </div>`;

    main.innerHTML = `
      ${sec("Цена и Floor", [
        ["min_price_ton", "Мин. цена TON"],
        ["max_price_ton", "Макс. цена TON"],
        ["floor_tolerance_pct", "Допуск над Floor, %"],
        ["min_discount_pct", "Мин. скидка от Floor, %"],
        ["require_floor", "Только с известным Floor"],
      ])}
      ${sec("Уведомления", [
        ["notifications_on", "Все уведомления"],
        ["mrkt_alerts_on", "🟣 MRKT алерты"],
        ["fragment_alerts_on", "🔵 Fragment алерты"],
        ["portals_alerts_on", "🟢 Portals алерты"],
        ["quiet_hours_start", "Тихие часы — начало"],
        ["quiet_hours_end", "Тихие часы — конец"],
        ["max_alerts_per_cycle", "Лимит алертов на цикл"],
        ["recent_rare_mode", "Режим «Редкие свежие»"],
        ["recent_rare_pm", "Порог редкости (‰)"],
      ])}
      ${sec("Фильтры", [
        ["filter_markets", "Маркеты"],
        ["filter_collections", "Коллекции (whitelist)"],
        ["filter_rarity", "Редкости"],
        ["max_rarity_pm", "Макс. rarity (‰), 0=выкл"],
        ["monochrome_only", "Только монохром"],
        ["number_filters", "Фильтры по номеру"],
      ])}
    `;
  }

  // Tab switching
  document.querySelectorAll(".tab").forEach(t => {
    t.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
      t.classList.add("active");
      const v = t.dataset.view;
      STATE.view = v;
      document.getElementById("feed-view").style.display = v === "feed" ? "" : "none";
      document.getElementById("settings-view").style.display = v === "settings" ? "" : "none";
      document.getElementById("filter-bar").style.display = v === "feed" ? "" : "none";
      if (v === "settings") renderSettings();
      else render();
    });
  });

  // ─── Data fetching ─────────────────────────────────
  async function fetchFeed() {
    let items = [];
    let source = "—";
    try {
      const r = await fetch("/api/feed?source=all&limit=300", { signal: AbortSignal.timeout(7000) });
      if (r.ok) {
        const data = await r.json();
        items = data.items || [];
        source = "комбинированный (live + бот)";
      }
    } catch (e) { /* fallthrough */ }

    if (!items.length) {
      // Fallback to direct Portals only
      try {
        const r = await fetch("https://portal-market.com/api/nfts/search?limit=200&offset=0");
        if (r.ok) {
          const data = await r.json();
          items = (data.results || []).map(p => {
            const attrs = p.attributes || [];
            const find = t => (attrs.find(a => a.type === t) || {});
            const m = find("model"), b = find("backdrop"), sym = find("symbol");
            return {
              ts: Date.now() / 1000, market: "portals",
              id: p.id, name: p.name,
              number: p.external_collection_number, slug: p.tg_id,
              price: parseFloat(p.price), floor_price: parseFloat(p.floor_price),
              model_name: m.value, backdrop_name: b.value, symbol_name: sym.value,
              rarities_pm: {
                model: m.rarity_per_mille,
                backdrop: b.rarity_per_mille,
                symbol: sym.rarity_per_mille,
              },
              colors: [], image_url: p.photo_url,
              url: `https://t.me/portals/market?startapp=gift_${p.id}`,
            };
          });
          source = "только Portals (fallback)";
        }
      } catch (e) { /* ignore */ }
    }

    STATE.items = items;
    STATE.source = source;
    STATE.lastFetch = Date.now();
    document.getElementById("subtitle").textContent =
      `источник: ${source} · ${items.length} лотов`;
    render();
  }

  async function fetchSettings() {
    try {
      const r = await fetch("/api/settings", { signal: AbortSignal.timeout(3000) });
      if (r.ok) {
        const data = await r.json();
        STATE.settings = data.settings;
        if (STATE.view === "settings") renderSettings();
      }
    } catch (e) { /* ignore */ }
  }

  // ─── Wire up controls ──────────────────────────────
  document.querySelectorAll("[data-market]").forEach(el => {
    el.addEventListener("click", () => {
      document.querySelectorAll("[data-market]").forEach(b => b.classList.remove("active"));
      el.classList.add("active");
      STATE.market = el.dataset.market;
      render();
    });
  });
  document.querySelectorAll("[data-flag]").forEach(el => {
    el.addEventListener("click", () => {
      const f = el.dataset.flag;
      if (STATE.flags.has(f)) { STATE.flags.delete(f); el.classList.remove("active"); }
      else { STATE.flags.add(f); el.classList.add("active"); }
      render();
    });
  });
  document.getElementById("min-disc").addEventListener("input", e => {
    STATE.minDisc = parseFloat(e.target.value) || 0;
    render();
  });
  document.getElementById("search").addEventListener("input", e => {
    STATE.search = e.target.value;
    render();
  });
  document.getElementById("sort").addEventListener("change", e => {
    STATE.sort = e.target.value;
    render();
  });
  document.getElementById("refresh-btn").addEventListener("click", () => {
    fetchFeed(); fetchSettings();
    if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
  });

  // Initial fetch + auto-refresh
  fetchFeed(); fetchSettings();
  setInterval(fetchFeed, 25_000);
  setInterval(fetchSettings, 60_000);
  setInterval(() => {
    if (STATE.lastFetch) {
      const sec = Math.round((Date.now() - STATE.lastFetch) / 1000);
      document.getElementById("ts-line").textContent =
        `${STATE.source} · обновлено ${sec} сек назад`;
    }
  }, 1000);
</script>
</body>
</html>
